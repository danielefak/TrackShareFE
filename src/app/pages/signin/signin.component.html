<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <img src="images/logo.png" alt="TrackShare" class="logo" />
      <h1>TrackShare</h1>
      <p class="subtitle">Create your account</p>
    </div>

    <form [formGroup]="signinForm" (ngSubmit)="signin()" class="auth-form">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <mat-icon matIconPrefix>person</mat-icon>
        <input matInput type="text" formControlName="first_name" required>
        <mat-error>Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <mat-icon matIconPrefix>email</mat-icon>
        <input type="email" matInput formControlName="email" placeholder="you@example.com">
        <mat-error>Enter a valid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <mat-icon matIconPrefix>lock</mat-icon>
        <input matInput type="password" formControlName="password" required>
        <mat-error>Password is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirm Password</mat-label>
        <mat-icon matIconPrefix>lock</mat-icon>
        <input matInput type="password" formControlName="confirm_password" required>
        <mat-error>Please confirm your password</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" class="submit-btn">Create Account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
